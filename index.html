<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KyaFlix — Showcasing the best from small creators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #000000;
    --page-text: #ffffff;
    --ink: #2c2622;
    --card-shadow: rgba(44,38,34,0.35);
    --icon-bg: #fbf4ea;
    --sponsor-purple: #a89aab;
    --card-pink: #fc6c86;
    --card-teal: #4fd6c4;
    --card-cream: #f3e6d6;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    background-color: var(--bg);
    color: var(--page-text);
    font-family: 'Space Mono', 'Courier New', monospace;
  }

  .page{
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .brand{
    text-align:center;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
    margin: 0 0 28px;
    color: var(--page-text);
  }

  .tagline{
    text-align:center;
    font-size: 1.15rem;
    line-height: 1.6;
    margin: 0 0 8px;
    color: var(--page-text);
  }

  .lineup-label{
    text-align:center;
    font-size: 1.15rem;
    margin: 0 0 36px;
    color: var(--page-text);
  }

  /* Cards: black background, outline + text take on the card's original color */
  .card{
    border-radius: 22px;
    border: 3px solid currentColor;
    box-shadow: 8px 8px 0 currentColor;
    padding: 32px 26px;
    margin-bottom: 44px;
    background: #000;
    color: var(--card-cream); /* default/fallback hue */
  }

  .card.sponsor{ color: var(--sponsor-purple); }
  .card.pink{ color: var(--card-pink); }
  .card.teal{ color: var(--card-teal); }

  .card h2{
    text-align:center;
    font-size: 1.5rem;
    margin: 0 0 6px;
    letter-spacing: 1px;
    color: inherit;
  }

  .sponsored-tag{
    text-align:center;
    font-size: 0.95rem;
    opacity: 0.85;
    margin: 0 0 18px;
    font-style: italic;
    color: inherit;
  }

  .card p{
    font-size: 0.98rem;
    line-height: 1.65;
    text-align:center;
    margin: 0 0 22px;
    color: inherit;
  }

  .card .lead{ font-weight: 700; color: inherit; }

  .card-image{
    display:block;
    width: 100%;
    height: auto;
    border-radius: 14px;
    border: 2px solid currentColor;
    margin: 0 0 20px;
    object-fit: cover;
  }

  /* Icon buttons keep their original light styling */
  .icon-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width: 56px;
    height: 56px;
    margin: 0 auto;
    background: var(--icon-bg);
    border: 3px solid var(--ink);
    border-radius: 14px;
    box-shadow: 5px 5px 0 var(--card-shadow);
    text-decoration:none;
    color: var(--ink);
    transition: transform 0.15s ease;
  }
  .icon-btn:hover{ transform: translate(-2px,-2px); }
  .icon-btn:active{ transform: translate(1px,1px); box-shadow: 3px 3px 0 var(--card-shadow); }

  .icon-btn svg{ width: 26px; height: 26px; }

  .social-row{
    display:flex;
    justify-content:center;
    gap: 28px;
    margin: 20px 0 44px;
  }

  .social-item{
    display:flex;
    flex-direction: column;
    align-items:center;
    gap: 10px;
  }

  .social-caption{
    font-size: 0.8rem;
    text-align:center;
    color: var(--page-text);
    margin: 0;
    max-width: 160px;
    line-height: 1.4;
  }

  .viewcount{
    text-align:center;
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0 0 24px;
    color: var(--page-text);
  }

  .footer-text{
    text-align:center;
    font-size: 0.98rem;
    line-height: 1.7;
    max-width: 520px;
    margin: 0 auto;
    color: var(--page-text);
  }

  .footer-text a{ color: var(--page-text); }

  /* Signup + Support cards — same prominent treatment, light background */
  .signup-card, .support-card{
    border-radius: 22px;
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--card-shadow);
    padding: 32px 26px;
    margin-bottom: 32px;
    background: var(--card-cream);
    text-align: center;
    color: var(--ink);
  }

  .signup-card h2, .support-card h2{
    font-size: 1.4rem;
    margin: 0 0 10px;
    letter-spacing: 1px;
    color: var(--ink);
  }

  .signup-card p, .support-card p{
    font-size: 0.95rem;
    line-height: 1.6;
    margin: 0 0 20px;
    color: var(--ink);
  }

  .support-card{ background: var(--card-pink); }

  .cta-btn{
    display:inline-block;
    font-family: inherit;
    font-size: 0.98rem;
    font-weight: 700;
    padding: 14px 28px;
    border: 3px solid var(--ink);
    border-radius: 12px;
    background: var(--card-cream);
    color: var(--ink);
    box-shadow: 5px 5px 0 var(--card-shadow);
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s ease;
  }

  .cta-btn:hover{ transform: translate(-2px,-2px); }
  .cta-btn:active{ transform: translate(1px,1px); box-shadow: 3px 3px 0 var(--card-shadow); }

  .signup-embed-wrap{
    max-width: 380px;
    margin: 0 auto;
  }

  .signup-embed-wrap iframe{
    width: 100%;
    border: 1px solid var(--ink);
    border-radius: 10px;
    background: white;
  }

  .signup-demo-note{
    font-size: 0.85rem;
    color: #6b5c00;
    margin: 0;
  }

  @media (max-width: 480px){
    .brand{ font-size: 1.6rem; }
    .card{ padding: 26px 18px; }
  }
</style>
</head>
<body>

<div class="page" id="page">
  <p style="text-align:center;">Loading…</p>
</div>

<script>
  const ARROW_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>';

  const EMAIL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg>';

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function renderCard(card){
    const paragraphsHtml = card.paragraphs.map(p => {
      const lead = p.lead ? '<span class="lead">' + escapeHtml(p.lead) + '</span>' : '';
      return '<p>' + lead + escapeHtml(p.text || '') + '</p>';
    }).join('');

    const sponsoredTag = card.sponsored ? '<p class="sponsored-tag">Sponsored</p>' : '';
    const imageHtml = card.image ? `<img class="card-image" src="${card.image}" alt="${escapeHtml(card.title)}">` : '';

    return `
      <div class="card ${card.color || ''}" id="${card.id}">
        <h2>${escapeHtml(card.title)}</h2>
        ${sponsoredTag}
        ${imageHtml}
        ${paragraphsHtml}
        <a class="icon-btn" href="${card.link}" target="_blank" rel="noopener" aria-label="Visit ${escapeHtml(card.title)}">
          ${ARROW_SVG}
        </a>
      </div>`;
  }

  function renderSignup(signup){
    const isPlaceholder = !signup.substackName || signup.substackName === "YOUR_SUBSTACK_NAME";

    if(isPlaceholder){
      return `
        <div class="signup-card" id="signup-card">
          <h2>${escapeHtml(signup.heading)}</h2>
          <p>${escapeHtml(signup.description)}</p>
          <p class="signup-demo-note">(Demo) Set "substackName" in data.json to your Substack publication name to load the live signup form here.</p>
        </div>`;
    }

    const embedSrc = `https://${signup.substackName}.substack.com/embed`;
    return `
      <div class="signup-card" id="signup-card">
        <h2>${escapeHtml(signup.heading)}</h2>
        <p>${escapeHtml(signup.description)}</p>
        <div class="signup-embed-wrap">
          <iframe src="${embedSrc}" width="100%" height="150" style="background:white;" frameborder="0" scrolling="no"></iframe>
        </div>
      </div>`;
  }

  function renderSupport(support){
    return `
      <div class="support-card" id="support-card">
        <h2>${escapeHtml(support.heading)}</h2>
        <p>${escapeHtml(support.description)}</p>
        <a class="cta-btn" href="${support.link}" target="_blank" rel="noopener">${escapeHtml(support.buttonText || 'Support')}</a>
      </div>`;
  }

  function renderPage(data){
    const page = document.getElementById('page');
    const cardsHtml = data.cards.map(renderCard).join('');

    page.innerHTML = `
      <div class="brand">${escapeHtml(data.site.brand)}</div>
      <p class="tagline">${escapeHtml(data.site.tagline)}</p>
      <p class="lineup-label">${escapeHtml(data.site.lineupLabel)}</p>

      ${cardsHtml}

      ${renderSupport(data.support)}

      ${renderSignup(data.signup)}

      <div class="social-row">
        <div class="social-item">
          <a class="icon-btn" href="${data.social.email}" aria-label="Email">${EMAIL_SVG}</a>
          <p class="social-caption">Email to submit your own content</p>
        </div>
      </div>

      <p class="viewcount">${escapeHtml(data.site.viewcount)}</p>

      <p class="footer-text">${escapeHtml(data.site.footerText)}</p>
    `;
  }

  // ---- LOAD DATA ----
  fetch('data.json')
    .then(res => {
      if(!res.ok) throw new Error('Failed to load data.json');
      return res.json();
    })
    .then(renderPage)
    .catch(err => {
      document.getElementById('page').innerHTML =
        '<p style="text-align:center;">Couldn\'t load data.json — ' + escapeHtml(err.message) +
        '. If you\'re testing locally by double-clicking the file, run a local server instead (e.g. <code>python3 -m http.server</code>) since browsers block fetch() on file:// URLs.</p>';
      console.error(err);
    });
</script>

<!-- GoatCounter analytics -->
<script data-goatcounter="https://YOUR_CODE.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
